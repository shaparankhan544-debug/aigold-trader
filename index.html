<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Gold Trader</title>

<style>

body{
margin:0;
padding:20px;
background:#0b1220;
font-family:Arial,sans-serif;
color:white;
}

.logo{
text-align:center;
font-size:34px;
font-weight:bold;
color:#FFD700;
margin-top:20px;
}

.card{
background:#162032;
padding:20px;
border-radius:20px;
margin-top:20px;
text-align:center;
}

.price{
font-size:42px;
font-weight:bold;
color:#FFD700;
}

.signal{
margin-top:15px;
padding:12px;
background:#00c853;
border-radius:12px;
font-size:26px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.box{
background:#162032;
padding:15px;
border-radius:15px;
text-align:center;
}

button{
width:100%;
padding:18px;
margin-top:25px;
border:none;
border-radius:15px;
background:#FFD700;
font-size:22px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:25px;
color:#999;
}

</style>

</head>

<body>

<div class="logo">

AI GOLD TRADER

</div>

<div class="card">

<h2>XAU/USD</h2>

<div class="price">

4263.18

</div>

<div class="signal">

BUY ✅

</div>

<p>Confidence 82%</p>

</div>

<div class="grid">

<div class="box">

<h3>Entry</h3>

4262.50

</div>

<div class="box">

<h3>Stop Loss</h3>

4252.50

</div>

<div class="box">

<h3>Take Profit</h3>

4278.00

</div>

<div class="box">

<h3>Risk Reward</h3>

1 : 2

</div>

</div>

<button>

GET AI SIGNAL

</button>

<div class="footer">

AI Gold Trader v1.0

</div>

</body>
</html>
